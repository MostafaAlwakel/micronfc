{% extends 'base.html' %}

{% block content %}

<div class="auth-container" style="align-items:flex-start; padding-top:2.5rem;">
  <div class="auth-card" style="max-width:600px;">

    <div class="auth-header">
      <span style="font-size:1.5rem;">🏥</span>
      <h2>Medical Info</h2>
      <p>Keep your emergency medical data up to date</p>
    </div>

    <!-- Emergency warning banner -->
    <div style="background:rgba(220,53,69,0.08); border:1px solid rgba(220,53,69,0.2); border-radius:var(--radius); padding:0.85rem 1rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:10px;">
      <i data-lucide="alert-triangle" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i>
      <p style="font-size:0.82rem; color:var(--muted); margin:0;">This info is shown to emergency responders when they scan your NFC device.</p>
    </div>

    <form method="POST">

      <!-- Blood Type -->
      <div class="form-group">
        <label><i data-lucide="droplet" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Blood Type</label>
        <select name="blood_type" class="form-control">
          <option value="">Select blood type...</option>
          {% for bt in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
            <option value="{{ bt }}" {% if user.blood_type == bt %}selected{% endif %}>{{ bt }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Allergies -->
      <div class="form-group">
        <label><i data-lucide="alert-triangle" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Allergies</label>
        <textarea name="allergies" class="form-control" rows="2"
          placeholder="e.g. Penicillin, Peanuts, Latex...">{{ user.allergies or '' }}</textarea>
      </div>

      <!-- Chronic Diseases -->
      <div class="form-group">
        <label><i data-lucide="heart-pulse" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Chronic Diseases</label>
        <textarea name="chronic_diseases" class="form-control" rows="2"
          placeholder="e.g. Diabetes Type 2, Hypertension...">{{ user.chronic_diseases or '' }}</textarea>
      </div>

      <!-- Medications -->
      <div class="form-group">
        <label><i data-lucide="pill" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Current Medications</label>
        <textarea name="medications" class="form-control" rows="2"
          placeholder="e.g. Metformin 500mg, Aspirin 100mg...">{{ user.medications or '' }}</textarea>
      </div>

      <div style="height:1px; background:var(--border); margin:1.5rem 0;"></div>
      <p style="font-size:0.8rem; color:var(--muted); margin-bottom:1rem; display:flex; align-items:center; gap:6px;">
        <i data-lucide="phone-call" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Emergency Contacts
      </p>

      <!-- Emergency Contact -->
      <div class="form-group">
        <label>Contact Name</label>
        <div class="input-wrapper">
          <i data-lucide="user" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i>
          <input type="text" name="emergency_contact_name" class="form-control"
                 value="{{ user.emergency_contact_name or '' }}" placeholder="Full name">
        </div>
      </div>

      <div class="form-group">
        <label>Contact Phone</label>
        <div class="input-wrapper">
          <i data-lucide="phone" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i>
          <input type="text" name="emergency_contact_phone" class="form-control"
                 value="{{ user.emergency_contact_phone or '' }}" placeholder="+201012345678">
        </div>
      </div>

      <div class="form-group">
        <label>Doctor Name</label>
        <div class="input-wrapper">
          <i data-lucide="stethoscope" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;" ></i>
          <input type="text" name="doctor_name" class="form-control"
                 value="{{ user.doctor_name or '' }}" placeholder="Dr. Ahmed Mohamed">
        </div>
      </div>

      <div class="form-group">
        <label>Doctor Phone</label>
        <div class="input-wrapper">
          <i data-lucide="phone" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i>
          <input type="text" name="doctor_phone" class="form-control"
                 value="{{ user.doctor_phone or '' }}" placeholder="+201012345678">
        </div>
      </div>

      <button type="submit" class="btn-primary w-100">
        <i data-lucide="save" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Save Changes
      </button>
    </form>

    <p class="auth-footer" style="margin-top:1.2rem;">
      <a href="{{ url_for('dashboard') }}"><i data-lucide="arrow-left" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Back to Dashboard</a>
    </p>
  </div>
</div>

{% endblock %}
