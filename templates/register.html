{% extends 'base.html' %}

{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-dot" style="width:12px; height:12px;"></span>
      <h2>Create account</h2>
      <p>Join MicroNFC today — it's free</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <i class="fa fa-user input-icon"></i>
          <input type="text" name="name" class="form-control" placeholder="Your full name" required autocomplete="name">
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fa fa-envelope input-icon"></i>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fa fa-lock input-icon"></i>
          <input type="password" name="password" id="password" class="form-control" placeholder="Min. 6 characters" required autocomplete="new-password" oninput="checkStrength(this.value)">
          <button type="button" class="eye-btn" onclick="togglePassword('password','eye-icon')">
            <i class="fa fa-eye" id="eye-icon"></i>
          </button>
        </div>
        <div style="margin-top: 6px;">
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="strength-bar" style="width:0%; background: var(--red);"></div>
          </div>
          <p id="strength-text" style="font-size:0.75rem; color: var(--muted); margin-top: 3px;"></p>
        </div>
      </div>

      <button type="submit" class="btn-primary w-100" style="margin-top:0.5rem;">
        <i class="fa fa-user-plus fa-sm"></i> Create Account
      </button>
    </form>

    <p class="auth-footer" style="margin-top: 1.5rem;">
      Already have an account? <a href="{{ url_for('login') }}">Sign in →</a>
    </p>
  </div>
</div>

<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fa fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fa fa-eye';
    }
  }

  function checkStrength(val) {
    const bar = document.getElementById('strength-bar');
    const text = document.getElementById('strength-text');
    if (!val) { bar.style.width = '0%'; text.textContent = ''; return; }
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
    const colors = ['', '#ff6b7a', '#ffc107', '#00b0ff', '#00e5a0', '#00e5a0'];
    const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];

    bar.style.width = widths[score];
    bar.style.background = colors[score];
    text.textContent = levels[score];
    text.style.color = colors[score];
  }
</script>

{% endblock %}
