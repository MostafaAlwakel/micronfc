{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-dot" style="width:12px; height:12px;"></span>
      <h2>Create account</h2>
      <p>Join MicroNFC today — it's free</p>
    </div>

    <!-- Google Register Button -->
    <a href="/auth/google"
      style="display:flex; align-items:center; justify-content:center; gap:10px;
             width:100%; padding:0.75rem; border-radius:var(--radius);
             border:1px solid var(--border2); background:var(--surface2);
             color:var(--text); text-decoration:none; font-size:0.9rem;
             font-weight:500; transition:all 0.2s; margin-bottom:1.25rem;"
      onmouseover="this.style.borderColor='rgba(0,229,160,0.4)'"
      onmouseout="this.style.borderColor='var(--border2)'">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
        <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
      </svg>
      Continue with Google
    </a>

    <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.25rem;">
      <div style="flex:1; height:1px; background:var(--border);"></div>
      <span style="font-size:0.78rem; color:var(--muted2);">or register with email</span>
      <div style="flex:1; height:1px; background:var(--border);"></div>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <i class="fa fa-user input-icon"></i>
          <input type="text" name="name" class="form-control" placeholder="Your full name" required autocomplete="name">
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fa fa-envelope input-icon"></i>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fa fa-lock input-icon"></i>
          <input type="password" name="password" id="password" class="form-control" placeholder="Min. 6 characters" required autocomplete="new-password" oninput="checkStrength(this.value)">
          <button type="button" class="eye-btn" onclick="togglePassword('password','eye-icon')">
            <i class="fa fa-eye" id="eye-icon"></i>
          </button>
        </div>
        <div style="margin-top: 6px;">
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="strength-bar" style="width:0%; background: var(--red);"></div>
          </div>
          <p id="strength-text" style="font-size:0.75rem; color: var(--muted); margin-top: 3px;"></p>
        </div>
      </div>
      <button type="submit" class="btn-primary w-100" style="margin-top:0.5rem;">
        <i class="fa fa-user-plus fa-sm"></i> Create Account
      </button>
    </form>

    <p class="auth-footer" style="margin-top: 1.5rem;">
      Already have an account? <a href="{{ url_for('login') }}">Sign in →</a>
    </p>
  </div>
</div>

<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fa fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fa fa-eye';
    }
  }

  function checkStrength(val) {
    const bar = document.getElementById('strength-bar');
    const text = document.getElementById('strength-text');
    if (!val) { bar.style.width = '0%'; text.textContent = ''; return; }
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
    const colors = ['', '#ff6b7a', '#ffc107', '#00b0ff', '#00e5a0', '#00e5a0'];
    const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];
    bar.style.width = widths[score];
    bar.style.background = colors[score];
    text.textContent = levels[score];
    text.style.color = colors[score];
  }
</script>
{% endblock %}
