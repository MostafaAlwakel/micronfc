{% extends 'base.html' %}

{% block content %}

<div class="auth-container" style="align-items:flex-start; padding-top:2.5rem;">
  <div class="auth-card" style="max-width:600px;">

    <div class="auth-header">
      <span class="logo-dot" style="width:12px; height:12px;"></span>
      <h2>Custom Links</h2>
      <p>Add any extra links to your profile</p>
    </div>

    <form method="POST" id="links-form">
      <div id="links-container">
        {% for link in links %}
        <div class="link-row" style="display:flex; gap:0.5rem; margin-bottom:0.75rem; align-items:center;">
          <input type="text" name="title[]" class="form-control" value="{{ link.title }}"
                 placeholder="Label (e.g. My Blog)" style="flex:1;">
          <input type="url" name="url[]" class="form-control" value="{{ link.url }}"
                 placeholder="https://..." style="flex:2;">
          <button type="button" onclick="removeLink(this)"
            style="background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.2); color:#ff6b7a;
                   width:38px; height:38px; border-radius:8px; cursor:pointer; flex-shrink:0; font-size:0.85rem;">
            <i class="fa fa-times"></i>
          </button>
        </div>
        {% endfor %}
      </div>

      <button type="button" onclick="addLink()" class="btn-secondary w-100" style="margin-bottom:1rem;">
        <i class="fa fa-plus fa-sm"></i> Add Link
      </button>

      <button type="submit" class="btn-primary w-100">
        <i class="fa fa-save fa-sm"></i> Save Links
      </button>
    </form>

    <p class="auth-footer" style="margin-top:1.2rem;">
      <a href="{{ url_for('dashboard') }}"><i class="fa fa-arrow-left fa-sm"></i> Back to Dashboard</a>
    </p>
  </div>
</div>

<script>
  function addLink() {
    const container = document.getElementById('links-container');
    const row = document.createElement('div');
    row.className = 'link-row';
    row.style.cssText = 'display:flex; gap:0.5rem; margin-bottom:0.75rem; align-items:center;';
    row.innerHTML = `
      <input type="text" name="title[]" class="form-control" placeholder="Label (e.g. My Blog)" style="flex:1;">
      <input type="url" name="url[]" class="form-control" placeholder="https://..." style="flex:2;">
      <button type="button" onclick="removeLink(this)"
        style="background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.2); color:#ff6b7a;
               width:38px; height:38px; border-radius:8px; cursor:pointer; flex-shrink:0; font-size:0.85rem;">
        <i class="fa fa-times"></i>
      </button>
    `;
    container.appendChild(row);
  }

  function removeLink(btn) {
    btn.closest('.link-row').remove();
  }
</script>

{% endblock %}
