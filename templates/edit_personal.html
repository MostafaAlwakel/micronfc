{% extends 'base.html' %}

{% block content %}

<div class="auth-container" style="align-items:flex-start; padding-top:2.5rem;">
  <div class="auth-card" style="max-width:600px;">

    <div class="auth-header">
      <span class="logo-dot" style="width:12px; height:12px;"></span>
      <h2>Personal Info</h2>
      <p>Update your personal information</p>
    </div>

    <form method="POST" enctype="multipart/form-data">

      <!-- Profile Photo -->
      <div class="form-group">
        <label><i class="fa fa-user-circle fa-sm"></i> Profile Photo</label>
        {% if user.profile_photo %}
          <div style="margin-bottom:0.75rem;">
            <img src="{{ user.profile_photo }}"
                 id="profile-preview"
                 style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--accent); display:block;">
          </div>
        {% else %}
          <div style="margin-bottom:0.75rem;">
            <img id="profile-preview" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--accent); display:none;">
            <div id="profile-placeholder" style="width:80px; height:80px; border-radius:50%; background:var(--accent-dim); border:2px dashed rgba(0,229,160,0.3); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:1.8rem;">
              <i class="fa fa-user"></i>
            </div>
          </div>
        {% endif %}
        <input type="file" name="profile_photo" class="form-control" accept="image/*"
               onchange="previewImage(this,'profile-preview','profile-placeholder')">
      </div>

      <!-- Cover Photo -->
      <div class="form-group">
        <label><i class="fa fa-image fa-sm"></i> Cover Photo</label>
        {% if user.cover_photo %}
          <div style="margin-bottom:0.75rem;">
            <img src="{{ user.cover_photo }}"
                 id="cover-preview"
                 style="width:100%; height:110px; border-radius:var(--radius); object-fit:cover; border:1px solid var(--border); display:block;">
          </div>
        {% else %}
          <div style="margin-bottom:0.75rem;">
            <img id="cover-preview" src="" style="width:100%; height:110px; border-radius:var(--radius); object-fit:cover; border:1px solid var(--border); display:none;">
            <div id="cover-placeholder" style="width:100%; height:80px; border-radius:var(--radius); background:var(--surface2); border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:0.85rem; gap:8px;">
              <i class="fa fa-panorama"></i> Cover Photo
            </div>
          </div>
        {% endif %}
        <input type="file" name="cover_photo" class="form-control" accept="image/*"
               onchange="previewImage(this,'cover-preview','cover-placeholder')">
      </div>

      <div class="form-group">
        <label><i class="fa fa-user fa-sm"></i> Full Name</label>
        <div class="input-wrapper">
          <i class="fa fa-user input-icon"></i>
          <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fa fa-phone fa-sm"></i> Phone</label>
        <div class="input-wrapper">
          <i class="fa fa-phone input-icon"></i>
          <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}" placeholder="+201012345678">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fa fa-briefcase fa-sm"></i> Job Title</label>
        <div class="input-wrapper">
          <i class="fa fa-briefcase input-icon"></i>
          <input type="text" name="job_title" class="form-control" value="{{ user.job_title or '' }}" placeholder="e.g. Software Engineer">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fa fa-align-left fa-sm"></i> Bio</label>
        <textarea name="bio" class="form-control" rows="3" placeholder="Tell people about yourself...">{{ user.bio or '' }}</textarea>
      </div>

      <button type="submit" class="btn-primary w-100">
        <i class="fa fa-save fa-sm"></i> Save Changes
      </button>
    </form>

    <p class="auth-footer" style="margin-top:1.2rem;">
      <a href="{{ url_for('dashboard') }}"><i class="fa fa-arrow-left fa-sm"></i> Back to Dashboard</a>
    </p>
  </div>
</div>

<script>
  function previewImage(input, previewId, placeholderId) {
    const preview = document.getElementById(previewId);
    const placeholder = document.getElementById(placeholderId);
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        if (placeholder) placeholder.style.display = 'none';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }
</script>

{% endblock %}
