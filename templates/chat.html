{% extends 'base.html' %}

{% block content %}

<style>
  .chat-page-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 1.5rem 1rem 2rem;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 80px);
  }

  .chat-page-card {
    display: flex;
    flex-direction: column;
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .chat-page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .chat-page-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1.2rem;
  }

  .chat-page-input {
    display: flex;
    gap: 0.75rem;
    padding: 1rem 1.2rem;
    border-top: 1px solid var(--border);
  }

  .chat-page-input input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 0.7rem 1rem;
    border-radius: 12px;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
  }

  .chat-page-input input:focus { outline: none; border-color: rgba(0,229,160,0.4); }
  .chat-page-input input::placeholder { color: var(--muted2); }
</style>

<div class="chat-page-wrap">

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:0.5rem;">
    <a href="{{ url_for('dashboard') }}" class="btn-secondary" style="padding:0.5rem 1rem; font-size:0.85rem;">
      <i class="fa fa-arrow-left fa-sm"></i> Dashboard
    </a>
    <button onclick="clearPageChat()" class="btn-secondary" style="padding:0.5rem 1rem; font-size:0.85rem;">
      <i class="fa fa-rotate-left fa-sm"></i> Clear Chat
    </button>
  </div>

  <div class="chat-page-card">
    <div class="chat-page-header">
      <div style="width:38px; height:38px; border-radius:50%; background:var(--accent-dim); border:2px solid rgba(0,229,160,0.3); display:flex; align-items:center; justify-content:center;">
        <i class="fa fa-robot" style="color:var(--accent);"></i>
      </div>
      <div style="flex:1;">
        <h4 style="font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; margin:0;">{{ user.name }}'s AI Assistant</h4>
        <span style="font-size:0.72rem; color:var(--accent); display:flex; align-items:center; gap:4px;">
          <span style="width:6px; height:6px; background:var(--accent); border-radius:50%; display:inline-block;"></span>
          Online — Ready to chat
        </span>
      </div>
      <a href="{{ url_for('edit_bot') }}" class="btn-secondary" style="padding:0.4rem 0.85rem; font-size:0.8rem;">
        <i class="fa fa-brain fa-sm"></i> Train
      </a>
    </div>

    <div class="chat-page-messages" id="chat-box">
      <div class="msg bot">
        <div class="msg-bubble">👋 Hi {{ user.name }}! I know your personal, medical, and professional info. Ask me anything!</div>
      </div>
    </div>

    <div class="chat-page-input">
      <input type="text" id="user-input" placeholder="Ask me anything..." autofocus>
      <button class="btn-primary" onclick="sendMessage()" style="padding:0.7rem 1.2rem; border-radius:12px;">
        <i class="fa fa-paper-plane fa-sm"></i>
      </button>
    </div>
  </div>
</div>

<script>
  const chatBox = document.getElementById('chat-box');
  const input = document.getElementById('user-input');

  input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  async function clearPageChat() {
    await fetch('/api/chat/clear', { method: 'POST' });
    chatBox.innerHTML = '';
    addMessage('👋 Fresh start! Ask me anything about {{ user.name }}.', 'bot');
  }

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    input.value = '';

    const typing = addMessage('Thinking...', 'bot typing');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      typing.remove();
      addMessage(data.response, 'bot');
    } catch {
      typing.remove();
      addMessage('Sorry, something went wrong!', 'bot');
    }
  }
</script>

{% endblock %}
