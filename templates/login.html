{% extends 'base.html' %}

{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-dot" style="width:12px; height:12px;"></span>
      <h2>Welcome back</h2>
      <p>Sign in to your MicroNFC account</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fa fa-envelope input-icon"></i>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fa fa-lock input-icon"></i>
          <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="togglePassword('password', 'eye-icon')">
            <i class="fa fa-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary w-100" style="margin-top:0.5rem;">
        <i class="fa fa-sign-in-alt fa-sm"></i> Sign In
      </button>
    </form>

    <p class="auth-footer" style="margin-top: 1.5rem;">
      Don't have an account? <a href="{{ url_for('register') }}">Create one →</a>
    </p>
  </div>
</div>

<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fa fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fa fa-eye';
    }
  }
</script>

{% endblock %}
