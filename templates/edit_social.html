{% extends 'base.html' %}

{% block content %}

<div class="auth-container" style="align-items:flex-start; padding-top:2rem;">
  <div class="auth-card" style="max-width:600px;">

    <div class="auth-header">
      <span class="logo-dot" style="width:12px; height:12px;"></span>
      <h2>Social Links</h2>
      <p>Connect your social media profiles</p>
    </div>

    <form method="POST">

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">WhatsApp</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-whatsapp"><img src="https://cdn.simpleicons.org/whatsapp/ffffff" width="20" height="20" alt="WhatsApp" style="vertical-align:middle;display:inline-block;"></div>
          <input type="text" name="whatsapp" class="form-control"
                 value="{{ user.whatsapp or '' }}"
                 placeholder="201012345678 (no + or spaces)">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">Instagram</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-instagram"><img src="https://cdn.simpleicons.org/instagram/ffffff" width="20" height="20" alt="Instagram" style="vertical-align:middle;display:inline-block;"></div>
          <input type="url" name="instagram" class="form-control"
                 value="{{ user.instagram or '' }}"
                 placeholder="https://instagram.com/username">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">Snapchat</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-snapchat"><img src="https://cdn.simpleicons.org/snapchat/000000" width="20" height="20" alt="Snapchat" style="vertical-align:middle;display:inline-block;"></div>
          <input type="url" name="snapchat" class="form-control"
                 value="{{ user.snapchat or '' }}"
                 placeholder="https://snapchat.com/add/username">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">Facebook</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-facebook"><img src="https://cdn.simpleicons.org/facebook/ffffff" width="20" height="20" alt="Facebook" style="vertical-align:middle;display:inline-block;"></div>
          <input type="url" name="facebook" class="form-control"
                 value="{{ user.facebook or '' }}"
                 placeholder="https://facebook.com/username">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">TikTok</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-tiktok"><img src="https://cdn.simpleicons.org/tiktok/ffffff" width="20" height="20" alt="TikTok" style="vertical-align:middle;display:inline-block;"></div>
          <input type="url" name="tiktok" class="form-control"
                 value="{{ user.tiktok or '' }}"
                 placeholder="https://tiktok.com/@username">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">YouTube</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-youtube"><img src="https://cdn.simpleicons.org/youtube/ffffff" width="20" height="20" alt="YouTube" style="vertical-align:middle;display:inline-block;"></div>
          <input type="url" name="youtube" class="form-control"
                 value="{{ user.youtube or '' }}"
                 placeholder="https://youtube.com/@channel">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">Twitter / X</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-twitter"><img src="https://cdn.simpleicons.org/x/ffffff" width="20" height="20" alt="X" style="vertical-align:middle;display:inline-block;"></div>
          <input type="url" name="twitter" class="form-control"
                 value="{{ user.twitter or '' }}"
                 placeholder="https://twitter.com/username">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">LinkedIn</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-linkedin"><img src="https://cdn.simpleicons.org/linkedin/ffffff" width="20" height="20" alt="LinkedIn" style="vertical-align:middle;display:inline-block;"></div>
          <input type="url" name="linkedin" class="form-control"
                 value="{{ user.linkedin or '' }}"
                 placeholder="https://linkedin.com/in/username">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">GitHub</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-github"><img src="https://cdn.simpleicons.org/github/ffffff" width="20" height="20" alt="GitHub" style="vertical-align:middle;display:inline-block;"></div>
          <input type="url" name="github" class="form-control"
                 value="{{ user.github or '' }}"
                 placeholder="https://github.com/username">
        </div>
      </div>

      <div class="form-group">
        <label style="font-size:0.8rem; color:var(--muted); font-weight:600; margin-bottom:0.4rem; display:block;">Website</label>
        <div class="social-input-row">
          <div class="social-icon-circle si-website"><i data-lucide="globe" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i></div>
          <input type="url" name="website" class="form-control"
                 value="{{ user.website or '' }}"
                 placeholder="https://yourwebsite.com">
        </div>
      </div>

      <button type="submit" class="btn-primary w-100">
        <i data-lucide="save" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Save Changes
      </button>
    </form>

    <p class="auth-footer" style="margin-top:1.2rem;">
      <a href="{{ url_for('dashboard') }}"><i data-lucide="arrow-left" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Back to Dashboard</a>
    </p>
  </div>
</div>

{% endblock %}
