{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width:560px; padding:4rem 1rem; text-align:center;">

  <div style="width:80px; height:80px; background:rgba(248,113,113,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem;">
    <i class="fa fa-times" style="font-size:2.2rem; color:#f87171;"></i>
  </div>

  <h2 style="font-family:'Syne',sans-serif; font-weight:800; margin-bottom:0.5rem;">Payment Cancelled</h2>
  <p style="color:var(--muted); margin-bottom:2rem;">Your order was cancelled. No charge was made to your card.</p>

  <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
    <a href="{{ url_for('store.index') }}" class="btn-nav" style="display:inline-block; padding:0.7rem 2rem;">
      Back to Store
    </a>
    {% if order %}
      <a href="{{ url_for('store.checkout', product_id=order.product_id) }}"
         style="display:inline-block; padding:0.7rem 2rem; border:1px solid var(--border2); border-radius:var(--radius); color:var(--text); text-decoration:none; font-size:0.9rem;">
        Try Again
      </a>
    {% endif %}
  </div>

</div>
{% endblock %}
