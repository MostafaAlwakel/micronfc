{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width:700px; padding:2rem 1rem 5rem;">

  <div style="margin-bottom:1.5rem;">
    <a href="{{ url_for('store.store_dashboard') }}"
       style="color:var(--muted); font-size:0.85rem; text-decoration:none;">
      <i data-lucide="arrow-left" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Dashboard
    </a>
    <h2 style="font-family:'Inter',sans-serif; font-weight:800; margin:0.3rem 0 0;">Store Staff</h2>
  </div>

  <!-- Add Staff -->
  <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-bottom:1.5rem;">
    <h6 style="font-family:'Inter',sans-serif; font-weight:600; margin:0 0 1rem;">Add Staff Member</h6>
    <form method="POST" action="{{ url_for('store.dashboard_add_staff') }}"
          style="display:flex; gap:0.75rem; flex-wrap:wrap;">
      <input type="email" name="email" required placeholder="User email"
             style="flex:1; min-width:200px; background:var(--surface2); border:1px solid var(--border2); color:var(--text); padding:0.6rem 1rem; border-radius:var(--radius); font-family:'Inter',sans-serif;">
      <select name="role"
              style="background:var(--surface2); border:1px solid var(--border2); color:var(--text); padding:0.6rem 1rem; border-radius:var(--radius);">
        <option value="staff">Staff</option>
        <option value="manager">Manager</option>
      </select>
      <button type="submit" class="btn-nav" style="padding:0.6rem 1.25rem;">Add</button>
    </form>
  </div>

  <!-- Staff List -->
  {% if staff_list %}
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;">
      {% for staff in staff_list %}
        <div style="display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem;
                    {% if not loop.last %}border-bottom:1px solid var(--border);{% endif %}">
          <div>
            <div style="font-weight:600;">{{ staff.user.name }}</div>
            <div style="font-size:0.8rem; color:var(--muted);">{{ staff.user.email }}</div>
          </div>
          <div style="display:flex; align-items:center; gap:0.75rem;">
            <span style="font-size:0.75rem; padding:0.2rem 0.6rem; border-radius:99px; background:rgba(27,79,216,0.1); color:var(--accent); border:1px solid var(--accent);">
              {{ staff.role }}
            </span>
            <form method="POST" action="{{ url_for('store.dashboard_remove_staff', staff_id=staff.id) }}"
                  onsubmit="return confirm('Remove {{ staff.user.name }}?')">
              <button type="submit"
                      style="padding:0.3rem 0.7rem; background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); border-radius:6px; color:#f87171; cursor:pointer; font-size:0.8rem;">
                Remove
              </button>
            </form>
          </div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div style="text-align:center; padding:3rem; color:var(--muted);">
      <i data-lucide="users" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i>
      <p>No staff members yet.</p>
    </div>
  {% endif %}

</div>
{% endblock %}
