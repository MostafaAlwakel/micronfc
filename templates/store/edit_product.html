{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width:600px; padding:2rem 1rem 5rem;">

  <a href="{{ url_for('store.dashboard_products') }}" style="color:var(--muted); font-size:0.85rem; text-decoration:none; display:inline-flex; align-items:center; gap:0.4rem; margin-bottom:1.5rem;">
    <i class="fa fa-arrow-left fa-sm"></i> Products
  </a>

  <h2 style="font-family:'Syne',sans-serif; font-weight:800; margin-bottom:1.5rem;">Edit Product</h2>

  <form method="POST">
    <div style="display:flex; flex-direction:column; gap:1rem;">

      <div>
        <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Product Name *</label>
        <input type="text" name="name" required value="{{ product.name }}"
               style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'DM Sans',sans-serif;">
      </div>

      <div>
        <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Description</label>
        <textarea name="description" rows="4"
                  style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'DM Sans',sans-serif; resize:vertical;">{{ product.description or '' }}</textarea>
      </div>

      <div style="display:flex; gap:1rem; flex-wrap:wrap;">
        <div style="flex:1; min-width:140px;">
          <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Price (USD) *</label>
          <input type="number" name="price" required min="0" step="0.01" value="{{ product.price }}"
                 style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'DM Sans',sans-serif;">
        </div>
        <div style="flex:1; min-width:140px;">
          <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Stock</label>
          <input type="number" name="stock" min="0" value="{{ product.stock }}"
                 style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'DM Sans',sans-serif;">
        </div>
      </div>

      <div>
        <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Image URL</label>
        <input type="url" name="image_url" value="{{ product.image_url or '' }}"
               style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'DM Sans',sans-serif;">
      </div>

      <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-size:0.9rem;">
        <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %} style="accent-color:var(--accent); width:16px; height:16px;">
        Active (visible in store)
      </label>

      <button type="submit" class="btn-nav" style="padding:0.75rem;">Save Changes</button>

    </div>
  </form>

</div>
{% endblock %}
