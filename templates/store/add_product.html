{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:600px; padding:2rem 1rem 5rem;">

  <a href="{{ url_for('store.dashboard_products') }}"
     style="color:var(--muted); font-size:0.85rem; text-decoration:none; display:inline-flex; align-items:center; gap:0.4rem; margin-bottom:1.5rem;">
    <i data-lucide="arrow-left" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Products
  </a>

  <h2 style="font-family:'Inter',sans-serif; font-weight:800; margin-bottom:1.5rem;">Add Product</h2>

  <form method="POST" enctype="multipart/form-data">
    <div style="display:flex; flex-direction:column; gap:1rem;">

      <div>
        <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Product Name *</label>
        <input type="text" name="name" required placeholder="e.g. MicroNFC Smart Card"
               style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'Inter',sans-serif;">
      </div>

      <div>
        <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Description</label>
        <textarea name="description" rows="4" placeholder="Describe the product…"
                  style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'Inter',sans-serif; resize:vertical;"></textarea>
      </div>

      <div style="display:flex; gap:1rem; flex-wrap:wrap;">
        <div style="flex:1; min-width:140px;">
          <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Price (EGP) *</label>
          <input type="number" name="price" required min="0" step="0.01" placeholder="199.99"
                 style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'Inter',sans-serif;">
        </div>
        <div style="flex:1; min-width:140px;">
          <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.3rem;">Stock</label>
          <input type="number" name="stock" value="0" min="0"
                 style="width:100%; background:var(--surface); border:1px solid var(--border2); color:var(--text); padding:0.65rem 1rem; border-radius:var(--radius); font-family:'Inter',sans-serif;">
        </div>
      </div>

      <!-- Multi-image upload -->
      <div>
        <label style="font-size:0.85rem; color:var(--muted); display:block; margin-bottom:0.5rem;">
          <i data-lucide="images" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Product Images
        </label>
        <div onclick="document.getElementById('imageInput').click()"
             style="cursor:pointer; border:2px dashed var(--border2); border-radius:var(--radius); padding:1.75rem; text-align:center; transition:border-color 0.2s;"
             onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--border2)'">
          <i data-lucide="cloud-upload" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;" ></i>
          <p style="color:var(--muted); margin-top:0.5rem; font-size:0.88rem;">Click to upload images (multiple allowed)</p>
          <p style="color:var(--muted2); font-size:0.78rem; margin-top:0.25rem;">First image = main product image</p>
        </div>
        <input type="file" name="images" id="imageInput" multiple accept="image/*" style="display:none">
        <div id="imagePreview" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.75rem;"></div>
      </div>

      <label style="display:flex; align-items:center; gap:0.6rem; cursor:pointer; font-size:0.9rem;">
        <input type="checkbox" name="is_active" checked style="accent-color:var(--accent); width:16px; height:16px;">
        Active (visible in store)
      </label>

      <button type="submit" class="btn-nav" style="padding:0.75rem; font-size:1rem;">
        <i data-lucide="plus" style="width:20px;height:20px;stroke:#1B4FD8;stroke-width:2;fill:none;"></i> Add Product
      </button>

    </div>
  </form>

</div>

<script>
document.getElementById('imageInput').addEventListener('change', function(e) {
  const preview = document.getElementById('imagePreview');
  preview.innerHTML = '';
  Array.from(e.target.files).forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:relative;';
      wrap.innerHTML = `
        <img src="${ev.target.result}"
             style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid ${i===0?'var(--accent)':'var(--border)'};">
        ${i===0?'<span style="position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:0.55rem;background:var(--accent);color:#000;border-radius:0 0 6px 6px;padding:1px;">MAIN</span>':''}
      `;
      preview.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  });
});
</script>
{% endblock %}
